[book]
authors = ["Microsoft"]
language = "en"
multilingual = false
src = "src"
title = "Teams AI Library (v2)"

[build]
build-dir = "../docs"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.theme]
pagetoc = false
sidebar-width = "250px"

[preprocessor.alerts]

[preprocessor.langtabs]
command = "mdbook-langtabs"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "http://github.com/microsoft/teams-ai"
additional-js = [
    "theme/mermaid/mermaid.min.js",
    "theme/mermaid/mermaid-init.js",
    "theme/langtabs/langtabs.js",
    "theme/lang/lang.js",
    "theme/pagetoc/pagetoc.js",
    "theme/custom.js"
]
additional-css = [
    "theme/variables.css",
    "theme/langtabs/langtabs.css",
    "theme/lang/lang.css",
    "theme/pagetoc/pagetoc.css",
    "theme/custom.css"
]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false

[output.html.print]
enable = false

# WARNING: Do not add anything below the following section.

[output.html.copy-files]
"src/getting-started/_lang/_lang.code-basics.cs.md" = "getting-started/_lang/_lang.code-basics.cs.md"
"src/getting-started/_lang/_lang.code-basics.ts.md" = "getting-started/_lang/_lang.code-basics.ts.md"
"src/getting-started/_lang/_lang.quickstart.cs.md" = "getting-started/_lang/_lang.quickstart.cs.md"
"src/getting-started/_lang/_lang.quickstart.ts.md" = "getting-started/_lang/_lang.quickstart.ts.md"
